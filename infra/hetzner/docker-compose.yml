services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: inova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inova_dev}
      POSTGRES_DB: inova_finance
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5442:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inova"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6340:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2024-07-26T20-48-21Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-inova}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-inova_dev_secret}
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5680}
    ports:
      - "5680:5678"
    depends_on:
      - postgres
      - redis

  chatwoot:
    image: chatwoot/chatwoot:latest
    command: ["sh", "-c", "bundle exec rails db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0"]
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET:-replace-me-in-production-min-32-chars-long}
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: inova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inova_dev}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL:-http://localhost:3101}
    ports:
      - "3101:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ocr-api:
    build:
      context: ../../services/ocr
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://inova:${POSTGRES_PASSWORD:-inova_dev}@postgres:5432/inova_finance
    ports:
      - "8815:8000"
    depends_on:
      postgres:
        condition: service_healthy

  fiscal-api:
    build:
      context: ../../services/fiscal
      dockerfile: Dockerfile
    ports:
      - "8816:8000"

  reporting-api:
    build:
      context: ../../services/reporting
      dockerfile: Dockerfile
    ports:
      - "8817:8000"

  bridges-api:
    build:
      context: ../../services/bridges
      dockerfile: Dockerfile
    environment:
      VPS_WEBHOOK_SECRET: ${VPS_WEBHOOK_SECRET:-dev-secret-change-me}
    ports:
      - "8814:8000"

volumes:
  postgres_data:
  qdrant_data:
  minio_data:

networks:
  default:
    name: inova-network
