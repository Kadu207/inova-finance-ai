# Configuração da análise SonarCloud — ver docs/SONARCLOUD.md
# A análise roda no job `sonarcloud` do CI (gated no segredo SONAR_TOKEN).

sonar.projectKey=Kadu207_inova-finance-ai

# ⚠️ AJUSTE: chave da SUA organização no SonarCloud (geralmente o login do GitHub
# em minúsculas). Confirme em sonarcloud.io → sua org → Administration → Key.
sonar.organization=kadu207

sonar.sources=apps/web/src,workers,packages,services
sonar.tests=workers,apps/web/src
sonar.test.inclusions=**/*.test.ts,**/test_*.py
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/*.test.ts,**/test_*.py,**/migrations/**,**/*.lock,pnpm-lock.yaml
sonar.sourceEncoding=UTF-8
