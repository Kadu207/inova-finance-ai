name: Deploy Production

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  deploy-workers:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - name: Deploy App API
        run: pnpm --filter @inova/app-api deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy Messaging
        run: pnpm --filter @inova/messaging deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy Agents
        run: pnpm --filter @inova/agents-runtime deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy Embedded
        run: pnpm --filter @inova/embedded-runtime deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-vps:
    runs-on: ubuntu-latest
    needs: deploy-workers
    steps:
      - uses: actions/checkout@v4
      - name: VPS deploy template
        run: |
          echo "SSH to Hetzner VPS and run:"
          echo "  cd infra/hetzner && docker compose pull && docker compose up -d"
