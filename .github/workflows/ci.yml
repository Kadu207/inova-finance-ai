name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck

  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm test

  # Isolamento multitenant (RLS) contra Postgres real. Sobe um serviço Postgres, aplica
  # schema + RLS (que cria a role NÃO-superuser inova_app) e roda o teste de isolamento
  # conectando como inova_app. Sem isto, o teste é PULADO (gated em RLS_TEST_DATABASE_URL).
  rls-isolation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: inova
          POSTGRES_PASSWORD: inova_dev
          POSTGRES_DB: inova_finance
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U inova -d inova_finance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      # Conexão de owner (superuser do serviço) para criar schema e a role inova_app.
      - name: Aplicar schema + RLS
        run: |
          pnpm db:push
          pnpm db:rls
        env:
          DATABASE_URL: postgresql://inova:inova_dev@localhost:5442/inova_finance
      # Conexão como inova_app (sem BYPASSRLS) — é o que torna a RLS efetiva no teste.
      - name: Teste de isolamento
        run: pnpm --filter @inova/app-api exec vitest run src/db/rls-isolation.test.ts
        env:
          RLS_TEST_DATABASE_URL: postgresql://inova_app:inova_app_dev@localhost:5442/inova_finance

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r services/ocr/requirements.txt
      - run: pytest services/ocr/app/test_main.py -v
        env:
          PYTHONPATH: services/ocr

  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm test:contract

  wrangler-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @inova/app-api build
      - run: pnpm --filter @inova/messaging build
      - run: pnpm --filter @inova/agents-runtime build

  sonarcloud:
    runs-on: ubuntu-latest
    # Análise SonarCloud via CI. Gated no segredo SONAR_TOKEN: se não estiver
    # configurado, o job apenas avisa e fica VERDE (não quebra o CI).
    # Requer DESLIGAR o "Automatic Analysis" no dashboard. Ver docs/SONARCLOUD.md.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Aviso se SONAR_TOKEN ausente
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "::notice::SONAR_TOKEN nao configurado — analise SonarCloud pulada. Veja docs/SONARCLOUD.md."
      - uses: actions/checkout@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        if: ${{ env.SONAR_TOKEN != '' }}
      - uses: actions/setup-node@v4
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          node-version: 22
          cache: pnpm
      # Gera o lcov para o "Coverage on New Code" do Quality Gate. Normaliza os caminhos
      # SF (relativos ao pacote) para a raiz do repo, senão o Sonar não casa os arquivos.
      - name: Gerar cobertura
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          pnpm install --frozen-lockfile
          pnpm db:generate
          pnpm --filter @inova/app-api test:coverage
          sed -i 's#^SF:#SF:workers/app-api/#' workers/app-api/coverage/lcov.info
      # Bloqueante: com o "Automatic Analysis" desligado no dashboard, o scan via CI
      # roda limpo. Se o scan falhar, o job falha (e é check obrigatório na main).
      - name: SonarCloud Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test-js, test-python]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy preview placeholder
        run: echo "Configure CLOUDFLARE_API_TOKEN for wrangler deploy --env staging"
